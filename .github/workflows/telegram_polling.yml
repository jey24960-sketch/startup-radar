name: Telegram 명령어 수신 (Polling)

on:
  schedule:
    # 5분마다 실행
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      # 이전 실행에서 저장한 offset 복원 (중복 처리 방지)
      - name: offset 캐시 복원
        uses: actions/cache/restore@v4
        with:
          path: telegram_offset.txt
          key: telegram-offset-${{ github.run_id }}
          restore-keys: |
            telegram-offset-

      - name: Telegram getUpdates → workflow_dispatch
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cat > poll_telegram.py << 'PYEOF'
          import os, json, urllib.request, urllib.error

          BOT_TOKEN  = os.environ["TELEGRAM_BOT_TOKEN"]
          ADMIN_CHAT_ID = (os.environ.get("TELEGRAM_ADMIN_CHAT_ID") or os.environ["TELEGRAM_CHAT_ID"]).strip()
          ALLOWED_IDS = {
              int(value.strip())
              for value in ADMIN_CHAT_ID.split(",")
              if value.strip().lstrip("-").isdigit()
          }
          GH_PAT     = os.environ["GH_PAT"]
          REPO       = os.environ["GITHUB_REPOSITORY"]   # "owner/repo"
          OFFSET_FILE = "telegram_offset.txt"
          VALID_STAGES = ["팀빌딩", "아이디어", "MVP", "초기매출"]
          BOT_COMMANDS = [
              {"command": "run", "description": "지금 즉시 수집하고 텔레그램으로 발송"},
              {"command": "dry", "description": "발송 없이 수집만 테스트"},
              {"command": "stop", "description": "정기 전송 중지"},
              {"command": "share", "description": "여러 사람이 결과를 받는 설정 안내"},
              {"command": "id", "description": "내 Telegram ID 확인"},
              {"command": "stage", "description": "동아리 단계 변경"},
              {"command": "status", "description": "봇 상태 확인"},
              {"command": "help", "description": "명령어 안내"},
          ]
          SHARE_HELP_TEXT = (
              "📣 여러 사람이 결과를 받게 하려면\n\n"
              "1. 텔레그램 채널 또는 그룹을 만듭니다.\n"
              "2. 이 봇을 채널 관리자 또는 그룹 멤버로 추가합니다.\n"
              "3. 채널이면 봇에 메시지 게시 권한을 줍니다.\n"
              "4. GitHub Secrets 또는 Cloudflare Worker Secret의 TELEGRAM_CHAT_ID를 그 채널/그룹 ID 또는 공개 채널 username으로 바꿉니다.\n"
              "5. TELEGRAM_ADMIN_CHAT_ID에는 관리자 개인 from.id를 넣습니다.\n\n"
              "이렇게 하면 결과는 여러 사람이 보는 곳으로 전송되고, /run, /dry, /stop 같은 명령은 관리자만 사용할 수 있습니다."
          )

          def read_offset():
              try:
                  with open(OFFSET_FILE) as f:
                      return int(f.read().strip())
              except Exception:
                  return None

          def write_offset(offset):
              with open(OFFSET_FILE, "w") as f:
                  f.write(str(offset))

          def tg_post(method, data):
              url = f"https://api.telegram.org/bot{BOT_TOKEN}/{method}"
              req = urllib.request.Request(
                  url,
                  data=json.dumps(data).encode(),
                  headers={"Content-Type": "application/json"},
              )
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f"Telegram API HTTP 오류 ({method}): {e.code} {e.reason}")
                  return {"ok": False, "error": str(e)}
              except urllib.error.URLError as e:
                  print(f"Telegram API 연결 오류 ({method}): {e.reason}")
                  return {"ok": False, "error": str(e)}
              except Exception as e:
                  print(f"Telegram API 예외 ({method}): {e}")
                  return {"ok": False, "error": str(e)}

          def send(chat_id, text, parse_mode=None):
              d = {"chat_id": chat_id, "text": text}
              if parse_mode:
                  d["parse_mode"] = parse_mode
              tg_post("sendMessage", d)

          def sync_bot_commands():
              result = tg_post("setMyCommands", {"commands": BOT_COMMANDS})
              if not result.get("ok"):
                  print("Telegram command menu sync skipped or failed")

          def build_id_help_text(from_id, chat_id):
              safe_from_id = from_id if from_id is not None else "없음"
              safe_chat_id = chat_id if chat_id is not None else "없음"
              return (
                  "🪪 Telegram ID 확인\n\n"
                  f"from.id: {safe_from_id}\n"
                  f"chat.id: {safe_chat_id}\n\n"
                  "GitHub Secret 또는 Cloudflare Worker Secret의 TELEGRAM_ADMIN_CHAT_ID에는 from.id 값을 넣으세요.\n"
                  "TELEGRAM_CHAT_ID는 결과를 받을 채널/그룹/개인 대상으로 둡니다."
              )

          def trigger_radar(dry_run):
              url = f"https://api.github.com/repos/{REPO}/actions/workflows/startup_radar.yml/dispatches"
              payload = {
                  "ref": "main",
                  "inputs": {"dry_run": str(dry_run).lower()},
              }
              req = urllib.request.Request(
                  url,
                  data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {GH_PAT}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json; charset=utf-8",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "StartupRadar-TelegramPoller",
                  },
              )
              urllib.request.urlopen(req)

          def trigger_stage(stage):
              url = f"https://api.github.com/repos/{REPO}/actions/workflows/update_stage.yml/dispatches"
              payload = {
                  "ref": "main",
                  "inputs": {"stage": stage},
              }
              req = urllib.request.Request(
                  url,
                  data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {GH_PAT}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json; charset=utf-8",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "StartupRadar-TelegramPoller",
                  },
              )
              urllib.request.urlopen(req)

          def trigger_auto_run(enabled):
              url = f"https://api.github.com/repos/{REPO}/actions/workflows/update_auto_run.yml/dispatches"
              payload = {
                  "ref": "main",
                  "inputs": {"enabled": str(enabled).lower()},
              }
              req = urllib.request.Request(
                  url,
                  data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {GH_PAT}",
                      "Accept": "application/vnd.github+json",
                      "Content-Type": "application/json; charset=utf-8",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "StartupRadar-TelegramPoller",
                  },
              )
              urllib.request.urlopen(req)

          sync_bot_commands()
          offset = read_offset()

          if offset is None:
              # 캐시 미스: 현재 쌓인 메시지 전부 스킵하고 최신 지점부터 시작
              result = tg_post("getUpdates", {"timeout": 0})
              updates = result.get("result", [])
              if updates:
                  new_offset = max(upd["update_id"] for upd in updates) + 1
              else:
                  new_offset = 0
              write_offset(new_offset)
              print(f"Fresh start: skipped {len(updates)} existing updates. Next offset: {new_offset}")
          else:
              result  = tg_post("getUpdates", {"offset": offset, "timeout": 0})
              updates = result.get("result", [])

              new_offset = offset
              for upd in updates:
                  new_offset = max(new_offset, upd["update_id"] + 1)

                  msg     = upd.get("message") or {}
                  chat_id = msg.get("chat", {}).get("id")
                  from_id = msg.get("from", {}).get("id")
                  text    = (msg.get("text") or "").strip()
                  cmd = text.split()[0].lower().split("@")[0] if text else ""

                  if cmd in {"/id", "/whoami", "id", "whoami"}:
                      send(chat_id, build_id_help_text(from_id, chat_id))
                      continue

                  # 허용된 관리자 개인 ID 외 무시. 그룹 명령은 chat_id가 그룹 ID라서 from_id를 기준으로 봅니다.
                  if from_id not in ALLOWED_IDS:
                      continue

                  try:
                      if cmd == "/run":
                          trigger_radar(False)
                          send(chat_id, "✅ StartupRadar 실행을 요청했습니다. (dry_run: false)")

                      elif cmd == "/dry":
                          trigger_radar(True)
                          send(chat_id, "🧪 StartupRadar 테스트 실행을 요청했습니다. (dry_run: true, 발송 없음)")

                      elif cmd == "/stop":
                          trigger_auto_run(False)
                          send(chat_id, "🛑 정기 전송을 중지합니다. 화/금 자동 실행은 꺼지고, 수동 /run은 계속 사용할 수 있습니다.")

                      elif cmd == "/share":
                          send(chat_id, SHARE_HELP_TEXT)

                      elif cmd == "/stage":
                          parts = text.split(maxsplit=1)
                          stage = parts[1].strip() if len(parts) > 1 else ""
                          if stage in VALID_STAGES:
                              trigger_stage(stage)
                              send(chat_id, f"⏳ 단계 변경 중... '{stage}'(으)로 변경 요청했습니다.")
                          else:
                              send(chat_id, "사용법: /stage [팀빌딩|아이디어|MVP|초기매출]")

                      elif cmd == "/status":
                          send(chat_id, "✅ StartupRadar 정상 작동 중")

                      elif cmd == "/help":
                          send(
                              chat_id,
                              "📋 *StartupRadar 명령어 목록*\n\n"
                              "/run — 지금 즉시 수집 + 발송\n"
                              "/dry — 수집만 (발송 없음)\n"
                              "/stop — 정기 전송 중지 (수동 /run은 유지)\n"
                              "/share — 여러 사람이 결과를 받는 설정 안내\n"
                              "/id — 내 Telegram ID 확인\n"
                              "/stage [단계] — 동아리 단계 변경\n"
                              "/status — 상태 확인\n"
                              "/help — 명령어 안내",
                              "Markdown",
                          )

                  except Exception as e:
                      print(f"명령 처리 오류 ({cmd}): {e}")
                      try:
                          send(chat_id, "⚠️ 명령 처리 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.")
                      except Exception:
                          pass

              write_offset(new_offset)
              print(f"Processed {len(updates)} updates. New offset: {new_offset}")
          PYEOF
          python3 poll_telegram.py

      # 다음 실행을 위해 offset 저장
      - name: offset 캐시 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: telegram_offset.txt
          key: telegram-offset-${{ github.run_id }}
